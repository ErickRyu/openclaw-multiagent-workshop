<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #e8e6e3;
      font-family: 'Noto Sans KR', sans-serif;
      text-align: center;
    }
    .wrap { padding: 24px; }
    h1 { font-size: 4rem; color: #e8453c; margin-bottom: 8px; }
    p { color: #8a8a9a; margin-bottom: 24px; }
    a {
      display: inline-block;
      padding: 12px 28px;
      background: #e8453c;
      color: #fff;
      text-decoration: none;
      border-radius: 100px;
      font-weight: 600;
      transition: opacity .2s;
    }
    a:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>페이지를 찾을 수 없습니다</p>
    <a href="/">홈으로 돌아가기</a>
  </div>
</body>
</html>
